[versions]
acf = "1.0.0"
classgraph = "4.8.184"
creative = "1.7.3"
guava = "33.6.0-jre"
jackson = "2.22.0"
kmongo = "5.6.0"
kotlin = "2.4.20-Beta1"
kotlinx = "1.11.0"
kyori = "4.26.1"
logback = "1.5.37"
mockbukkit = "4.110.0"
mockk = "1.14.11"
mongodb = "5.8.0"
mongojack = "6.0.0"
packetevents = "2.13.0"
paper = "26.2-rc-2.build.9-alpha"
xyz-xenondevs-invui = "2.2.0"

[libraries]
acf-paper = { module = "com.github.bananababoo.acf:acf-paper", version.ref = "acf" }
adventure-extra-kotlin = { module = "net.kyori:adventure-extra-kotlin", version.ref = "kyori" }
adventure-gson = "net.kyori:adventure-text-serializer-gson:5.1.1"
classgraph = { module = "io.github.classgraph:classgraph", version.ref = "classgraph" }
creative-api = { module = "team.unnamed:creative-api", version.ref = "creative" }
creative-serializer = { module = "team.unnamed:creative-serializer-minecraft", version.ref = "creative" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
invui = { module = "xyz.xenondevs.invui:invui", version.ref = "xyz-xenondevs-invui" }
invui-kotlin = { module = "xyz.xenondevs.invui:invui-kotlin", version.ref = "xyz-xenondevs-invui" }
jackson = "com.fasterxml.jackson.core:jackson-core:2.22.0"
jackson-kotlin = { module = "com.fasterxml.jackson.module:jackson-module-kotlin", version.ref = "jackson" }
