kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx" }
logback = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
mockbukkit = { module = "org.mockbukkit.mockbukkit:mockbukkit-v1.21", version.ref = "mockbukkit" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
mongo-bson = { module = "org.mongodb:bson-kotlinx", version.ref = "mongodb" }
mongo-jackdriver = { module = "org.mongojack:mongojack", version.ref = "mongojack" }
packetevents = { module = "com.github.retrooper:packetevents-spigot", version.ref = "packetevents" }
paper-api = { module = "io.papermc.paper:paper-api", version.ref = "paper" }
